<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verlanglijstje</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f2f2f2;
            color: #333;
            margin: 0;
            padding: 0;
            background-image: url('https://example.com/kerst-background.jpg');
            background-size: cover;
            background-attachment: fixed;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #d32f2f;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
        }
        .christmas-decor {
            text-align: center;
            margin-top: 20px;
        }
        .christmas-decor img {
            width: 100px;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verlanglijstje</h1>
        <p>
            Dit jaar heb ik een aantal speciale wensen voor Kerstmis. Ik hoop dat de kerstman ze kan vervullen!
        </p>
        <ul>
            <li>Een nieuwe laptop</li>
            <li>Een paar warme sokken</li>
            <li>Een goed boek om te lezen</li>
            <li>Een gezellige avond met familie en vrienden</li>
        </ul>
        <div class="christmas-decor">
            <img src="https://example.com/kerstman.png" alt="Kerstman">
            <img src="https://example.com/kerstboom.png" alt="Kerstboom">
            <img src="https://example.com/cadeau.png" alt="Cadeau">
        </div>
    </div>
</body>
</html>
