<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mats Overmans Homepage</title>
    <style>
        body {
            background-color: #1C1C1C; /* Donkergrijze achtergrondkleur */
            font-family: 'Helvetica Neue', sans-serif; /* Modern lettertype */
            text-align: center;
            padding: 50px;
            color: #E0E0E0; /* Lichte tekst voor betere leesbaarheid */
            overflow-y: scroll;
        }
        h1 {
            color: #FFD700; /* Gouden kleur voor de titel */
            text-shadow: 2px 2px 4px #000000; /* Schaduw voor een feestelijk effect */
        }
        p {
            color: #E0E0E0; /* Lichte kleur voor de beschrijving */
        }
        button {
            background-color: #B22222; /* Donkerrode achtergrondkleur */
            color: #E0E0E0; /* Lichte tekst op de knoppen */
            padding: 15px 32px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 2px 2px 5px #000000; /* Schaduw voor een feestelijk effect */
        }
        button:hover {
            background-color: #FF6347; /* Lichtere rode kleur bij hover */
        }
        #clock {
            font-size: 2em;
            font-family: 'Helvetica Neue', sans-serif; /* Modern lettertype */
            color: #FFD700; /* Gouden kleur voor de klok */
            margin-top: 20px;
        }
        .snowflake {
            color: #FFF;
            font-size: 1em;
            position: absolute;
            top: -10px;
            z-index: 9999;
            user-select: none;
            cursor: default;
            animation: fall 10s linear infinite;
        }
        @keyframes fall {
            0% { top: -10px; transform: translateX(0); }
            100% { top: 100vh; transform: translateX(100px); }
        }
        .navbar {
            display: flex;
            justify-content: center;
            background-color: #333;
            padding: 10px;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .navbar a {
            color: #E0E0E0;
            padding: 14px 20px;
            text-decoration: none;
            text-align: center;
        }
        .navbar a:hover {
            background-color: #575757;
        }
        .icon {
            width: 50px;
            height: 50px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="https://github.com/MatsDevOfficial">Github</a>
        <a href="https://foto.overmans.nl/">Fotos</a>
        <a href="https://zieschier.overmans.nl/">Zie Schier</a>
        <a href="https://zshop.overmans.nl/">Schiervogel</a>
        <a href="https://x.thunkable.com/projectPage/6746eac3cdf2d66175cd8130">App</a>
    </div>

    <h1>Welkom op mijn website! Zelf gecodeerd.</h1>
    <p id="intro">Dit is een eenvoudige website met JavaScript.</p>

    <div id="clock"></div>

    <img src="kersticoon1.png" alt="Kersticoon 1" class="icon">
    <img src="kersticoon2.png" alt="Kersticoon 2" class="icon">
    <img src="kersticoon3.png" alt="Kersticoon 3" class="icon">
    <img src="kersticoon4.png" alt="Kersticoon 4" class="icon">

    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const timeString = `${hours}:${minutes}:${seconds}`;
            document.getElementById('clock').textContent = timeString;
        }

        setInterval(updateClock, 1000);
        updateClock(); // Initial call to display clock immediately

        // Snowflake effect
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            snowflake.textContent = '❄';
            snowflake.style.left = `${Math.random() * 100}vw`;
            snowflake.style.animationDuration = `${Math.random() * 3 + 2}s`;
            document.body.appendChild(snowflake);

            setTimeout(() => {
                snowflake.remove();
            }, 5000);
        }

        setInterval(createSnowflake, 200);
    </script>
</body>
</html>
