<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mats Overmans Homepage</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #2c3e50; /* Donkere achtergrondkleur */
            background-image: url('https://example.com/kerst-background.jpg'); /* Achtergrondafbeelding in kerstsfeer */
            background-size: cover;
            background-position: center;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            color: white; /* Witte tekst voor betere leesbaarheid */
        }
        h1 {
            color: #e74c3c; /* Rood voor de titel */
        }
        p {
            color: white; /* Witte kleur voor de beschrijving */
        }
        button {
            background-color: #27ae60; /* Groene achtergrondkleur */
            color: white;
            padding: 15px 32px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #2ecc71; /* Lichtere groene kleur bij hover */
        }
    </style>
</head>
<body>
    <h1>Welkom op mijn website! Zelf gecodeerd.</h1>
    <p id="intro">Dit is een eenvoudige website met JavaScript.</p>

    <button onclick="window.location.href='https://github.com/MatsDevOfficial'">Github</button>
    <button onclick="window.location.href='https://foto.overmans.nl/'">Fotos</button>
    <button onclick="window.location.href='https://zieschier.overmans.nl/'">Zie Schier</button>
    <button onclick="window.location.href='https://zshop.overmans.nl/'">Schiervogel</button>
    <button onclick="window.location.href='https://x.thunkable.com/projectPage/6746eac3cdf2d66175cd8130'">App</button>

    <script src="script.js"></script>
</body>
</html>
