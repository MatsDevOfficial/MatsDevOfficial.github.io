<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mats Overmans Homepage</title>
    <style>
        body {
            background-color: #228B22; /* Groene achtergrondkleur */
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            color: white; /* Witte tekst voor betere leesbaarheid */
        }
        h1 {
            color: #FF0000; /* Rode kleur voor de titel */
            text-shadow: 2px 2px 4px #000000; /* Schaduw voor een feestelijk effect */
        }
        p {
            color: white; /* Witte kleur voor de beschrijving */
        }
        button {
            background-color: #FF0000; /* Rode achtergrondkleur */
            color: white; /* Witte tekst op de knoppen */
            padding: 15px 32px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 2px 2px 5px #000000; /* Schaduw voor een feestelijk effect */
        }
        button:hover {
            background-color: #FF6347; /* Lichtere rode kleur bij hover */
        }
    </style>
</head>
<body>
    <h1>Welkom op mijn website! Zelf gecodeerd.</h1>
    <p id="intro">Dit is een eenvoudige website met JavaScript.</p>

    <button onclick="window.location.href='https://github.com/MatsDevOfficial'">Github</button>
    <button onclick="window.location.href='https://foto.overmans.nl/'">Fotos</button>
    <button onclick="window.location.href='https://zieschier.overmans.nl/'">Zie Schier</button>
    <button onclick="window.location.href='https://zshop.overmans.nl/'">Schiervogel</button>
    <button onclick="window.location.href='https://x.thunkable.com/projectPage/6746eac3cdf2d66175cd8130'">App</button>

    <script src="script.js"></script>
</body>
</html>
